<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ประวัติการใช้รถ | Car Usage History</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --primary: #16a34a;
  --primary-light: #22c55e;
  --primary-dark: #14532d;
  --bg: #f0fdf4;
  --card: #fff;
  --text: #1e293b;
  --muted: #64748b;
  --border: #e2e8f0;
  --shadow: 0 8px 20px rgba(0,0,0,0.05);
  --returned: #16a34a;
  --pending: #f59e0b;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{
  font-family: 'Kanit', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
}
/* Header Gradient */
.top-header{
  background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
  color: white;
  padding: 30px 20px 80px;
  position: relative;
  overflow: hidden;
}
.top-header::after{
  content: '';
  position: absolute;
  bottom: -30px;
  left: 0;
  right: 0;
  height: 70px;
  background: var(--bg);
  border-radius: 50% 50% 0 0;
}
.header-inner{
  max-width: 1280px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
}
.header-row{
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 15px;
}
.header-logo{
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-logo .icon{
  font-size: 38px;
  filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
}
.header-logo h1{
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.header-logo p{
  font-size: 13px;
  opacity: 0.85;
}
.action-buttons{
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.btn-outline-light{
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,0.4);
  padding: 8px 18px;
  border-radius: 40px;
  color: white;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: 0.2s;
}
.btn-outline-light:hover{
  background: white;
  color: var(--primary-dark);
  border-color: white;
}
.btn-export-light{
  background: white;
  color: var(--primary-dark);
  border: none;
  padding: 8px 18px;
  border-radius: 40px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: 0.2s;
  font-family: 'Kanit', sans-serif;
}
.btn-export-light:hover{
  background: #f0fdf4;
  transform: scale(0.97);
}
/* Stats Cards */
.stats-row{
  max-width: 1280px;
  margin: -40px auto 0;
  padding: 0 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 18px;
  position: relative;
  z-index: 5;
}
.stat-card{
  background: white;
  border-radius: 28px;
  padding: 18px 12px;
  text-align: center;
  box-shadow: var(--shadow);
  transition: all 0.2s;
  border: 1px solid rgba(0,0,0,0.03);
}
.stat-card:hover{
  transform: translateY(-4px);
  box-shadow: 0 15px 30px rgba(0,0,0,0.08);
}
.stat-icon{
  font-size: 32px;
  margin-bottom: 8px;
}
.stat-num{
  font-size: 32px;
  font-weight: 800;
  color: var(--primary);
  line-height: 1.2;
}
.stat-label{
  font-size: 13px;
  color: var(--muted);
  font-weight: 500;
}
/* Filter */
.filter-section{
  max-width: 1280px;
  margin: 30px auto 20px;
  padding: 0 20px;
}
.filter-bar{
  background: white;
  border-radius: 28px;
  padding: 16px 24px;
  box-shadow: var(--shadow);
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
}
.filter-bar input, .filter-bar select{
  flex: 1;
  min-width: 130px;
  padding: 10px 16px;
  border: 1.5px solid var(--border);
  border-radius: 60px;
  font-family: 'Kanit', sans-serif;
  font-size: 14px;
  outline: none;
  transition: 0.2s;
  background: white;
}
.filter-bar input:focus, .filter-bar select:focus{
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(22,163,74,0.1);
}
.btn-filter, .btn-reset{
  padding: 10px 20px;
  border-radius: 60px;
  font-family: 'Kanit', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
  border: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn-filter{
  background: var(--primary);
  color: white;
}
.btn-filter:hover{
  background: var(--primary-dark);
  transform: scale(0.97);
}
.btn-reset{
  background: #f1f5f9;
  color: var(--muted);
  border: 1px solid var(--border);
}
.btn-reset:hover{
  background: #e2e8f0;
}
/* Table Card */
.table-section{
  max-width: 1280px;
  margin: 0 auto 50px;
  padding: 0 20px;
}
.table-card{
  background: white;
  border-radius: 32px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.table-header{
  padding: 18px 24px;
  border-bottom: 2px solid var(--bg);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
}
.table-header h2{
  font-size: 18px;
  font-weight: 600;
}
.record-count{
  background: var(--bg);
  padding: 5px 14px;
  border-radius: 40px;
  font-size: 13px;
  color: var(--primary-dark);
  font-weight: 500;
}
.table-wrap{
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
table{
  width: 100%;
  border-collapse: collapse;
  min-width: 900px;
}
th{
  text-align: left;
  padding: 16px 16px;
  background: #f9fafb;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
td{
  padding: 14px 16px;
  border-top: 1px solid var(--bg);
  font-size: 14px;
  vertical-align: middle;
}
tr:hover td{
  background: #fefce8;
}
.user-cell{
  display: flex;
  align-items: center;
  gap: 10px;
}
.avatar-img{
  width: 38px;
  height: 38px;
  border-radius: 40px;
  object-fit: cover;
  background: #e2e8f0;
}
.avatar-placeholder{
  width: 38px;
  height: 38px;
  border-radius: 40px;
  background: linear-gradient(145deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: bold;
  font-size: 16px;
}
.user-name{
  font-weight: 600;
}
.dept{
  font-size: 11px;
  color: var(--muted);
}
.badge{
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 40px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}
.badge-returned{
  background: #dcfce7;
  color: #15803d;
}
.badge-pending{
  background: #fef3c7;
  color: #b45309;
}
.car-badge{
  background: #eef2ff;
  color: #1e40af;
  padding: 4px 12px;
  border-radius: 40px;
  font-size: 12px;
  font-weight: 500;
  display: inline-block;
}
.route-val{
  font-weight: 600;
  color: var(--primary-dark);
}
/* Pagination */
.pagination{
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  padding: 18px;
  border-top: 2px solid var(--bg);
  flex-wrap: wrap;
}
.page-btn{
  width: 38px;
  height: 38px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: white;
  font-family: 'Kanit', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
}
.page-btn.active, .page-btn:hover{
  background: var(--primary);
  border-color: var(--primary);
  color: white;
}
.page-info{
  font-size: 13px;
  color: var(--muted);
  margin-left: 6px;
}
.empty-state, .loading-state{
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
/* Responsive */
@media (max-width: 720px){
  .stats-row{
    grid-template-columns: repeat(2,1fr);
    gap: 12px;
  }
  .filter-bar{
    flex-direction: column;
    align-items: stretch;
  }
  .filter-bar input, .filter-bar select, .btn-filter, .btn-reset{
    width: 100%;
  }
  .header-row{
    flex-direction: column;
    text-align: center;
  }
  /* ปรับขนาดฟอนต์และ padding สำหรับมือถือ */
  th, td{
    padding: 10px 12px;
    font-size: 12px;
  }
  .user-name{
    font-size: 13px;
  }
  .badge{
    padding: 3px 8px;
    font-size: 10px;
  }
  .car-badge{
    padding: 3px 8px;
    font-size: 10px;
  }
}
</style>
</head>
<body>

<div class="top-header">
  <div class="header-inner">
    <div class="header-row">
      <div class="header-logo">
        <span class="icon">🚘</span>
        <div>
          <h1>ประวัติการใช้รถ</h1>
          <p>Car Usage History · บันทึกการเดินทาง</p>
        </div>
      </div>
      <div class="action-buttons">
        <button class="btn-export-light" id="exportBtn">
          <i class="fas fa-download"></i> CSV
        </button>
        <a href="/" class="btn-outline-light">
          <i class="fas fa-arrow-left"></i> กลับหน้าหลัก
        </a>
      </div>
    </div>
  </div>
</div>

<div class="stats-row" id="statsRow">
  <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-num" id="statTotal">-</div><div class="stat-label">เที่ยวทั้งหมด</div></div>
  <div class="stat-card"><div class="stat-icon">🛣️</div><div class="stat-num" id="statKm">-</div><div class="stat-label">รวมระยะทาง (กม.)</div></div>
  <div class="stat-card"><div class="stat-icon">🔑</div><div class="stat-num" id="statActive">-</div><div class="stat-label">กำลังใช้อยู่</div></div>
  <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-num" id="statReturned">-</div><div class="stat-label">คืนแล้ว</div></div>
</div>

<div class="filter-section">
  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="🔍 ค้นหาชื่อ, ทะเบียน, สาเหตุ...">
    <select id="filterCar">
      <option value="">🚗 ทุกคัน</option>
      <option value="Nissan">Nissan ผอ 5757</option>
      <option value="Mazda">Mazda ยค 3777</option>
      <option value="MG">MG งบ 255</option>
      <option value="Click">Honda Click จงจ 222</option>
      <option value="Fino">Fino งธท 222</option>
    </select>
    <select id="filterStatus">
      <option value="">📌 สถานะทั้งหมด</option>
      <option value="pending">🚀 กำลังใช้</option>
      <option value="returned">✅ คืนแล้ว</option>
    </select>
    <input type="date" id="filterDate" placeholder="วันที่เริ่ม">
    <button class="btn-filter" onclick="applyFilter()"><i class="fas fa-sliders-h"></i> กรอง</button>
    <button class="btn-reset" onclick="resetFilter()"><i class="fas fa-undo-alt"></i> รีเซ็ต</button>
  </div>
</div>

<div class="table-section">
  <div class="table-card">
    <div class="table-header">
      <h2><i class="fas fa-list-ul" style="margin-right: 8px;"></i> รายการจองใช้รถ</h2>
      <span class="record-count" id="recordCount">กำลังโหลด...</span>
    </div>
    <div class="loading-state" id="loadingState">
      <div style="font-size: 40px;">⏳</div>
      <div>กำลังโหลดข้อมูล...</div>
    </div>
    <div class="table-wrap" id="desktopTable" style="display: none;">
      <table>
        <thead>
          <tr><th>ผู้ใช้</th><th>ทะเบียนรถ</th><th>ไมล์เริ่ม</th><th>สาเหตุ</th><th>ระยะทาง</th><th>วันที่เริ่ม</th><th>สถานะ</th><th>คืนเมื่อ</th><th>ระยะเวลา</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="empty-state" id="emptyState" style="display: none;">
      <div style="font-size: 48px;">🧾</div>
      <div style="font-weight: 600; margin-top: 8px;">ไม่พบข้อมูล</div>
      <div style="font-size: 13px;">ลองปรับตัวกรองหรือรีเซ็ต</div>
    </div>
    <div class="pagination" id="pagination" style="display: none;"></div>
  </div>
</div>

<script>
let allRecords = [];
let filteredRecords = [];
let currentPage = 1;
const PAGE_SIZE = 20;

async function loadData() {
  try {
    const res = await fetch('/get-records');
    if (!res.ok) throw new Error(`HTTP Error ${res.status}`);
    const data = await res.json();
    allRecords = data.records || [];
    const stats = data.stats || {};
    
    document.getElementById('statTotal').innerText = stats.total || allRecords.length;
    document.getElementById('statKm').innerText = stats.total_km ? stats.total_km.toFixed(0) : '0';
    document.getElementById('statActive').innerText = stats.active || 0;
    const returnedCount = (stats.total || allRecords.length) - (stats.active || 0);
    document.getElementById('statReturned').innerText = returnedCount;
    
    filteredRecords = [...allRecords];
    currentPage = 1;
    renderUI();
    document.getElementById('loadingState').style.display = 'none';
  } catch (err) {
    document.getElementById('loadingState').innerHTML = `<div>⚠️ โหลดล้มเหลว: ${err.message}<br><button onclick="loadData()" style="margin-top:12px; padding:8px 20px; background:#16a34a; color:white; border-radius:40px; border:none;">ลองอีกครั้ง</button></div>`;
  }
}

function renderUI() {
  const total = filteredRecords.length;
  document.getElementById('recordCount').innerText = `${total} รายการ`;
  if (total === 0) {
    document.getElementById('desktopTable').style.display = 'none';
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('pagination').style.display = 'none';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('desktopTable').style.display = 'block';
  
  const start = (currentPage-1)*PAGE_SIZE;
  const pageData = filteredRecords.slice(start, start+PAGE_SIZE);
  
  // Desktop table only
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = pageData.map(r => {
    const statusHtml = r.returnStatus === 'returned' ? `<span class="badge badge-returned"><i class="fas fa-check-circle"></i> คืนแล้ว</span>` : `<span class="badge badge-pending"><i class="fas fa-car-side"></i> กำลังใช้</span>`;
    const avatarHtml = r.pictureUrl ? `<img src="${r.pictureUrl}" class="avatar-img" onerror="this.style.display='none'">` : `<div class="avatar-placeholder">${(r.name?.charAt(0)||'U')}</div>`;
    return `<tr>
      <td><div class="user-cell">${avatarHtml}<div><div class="user-name">${escapeHtml(r.name||'-')}</div><div class="dept">${escapeHtml(r.department||'')} ${r.phone ? '📞 '+r.phone : ''}</div></div></div></td>
      <td><span class="car-badge">🚙 ${escapeHtml(r.car||'-')}</span></td>
      <td>${escapeHtml(r.mileage||'-')}</td>
      <td style="max-width:180px">${escapeHtml(r.reason||'-')}</td>
      <td class="route-val">${r.totalDistance ? r.totalDistance.toFixed(1)+' กม.' : '-'}</td>
      <td style="white-space:nowrap">${formatDate(r.timestamp)}</td>
      <td>${statusHtml}</td>
      <td>${r.returnedAt ? formatDate(r.returnedAt) : '-'}</td>
      <td>${r.durationText || '-'}</td>
    </table>`;
  }).join('');
  
  renderPagination(total);
}

function renderPagination(total) {
  const pages = Math.ceil(total/PAGE_SIZE);
  const paginationDiv = document.getElementById('pagination');
  if(pages <= 1) { paginationDiv.style.display = 'none'; return; }
  paginationDiv.style.display = 'flex';
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1 ? 'disabled' : ''}>‹</button>`;
  for(let i=1;i<=pages;i++){
    if(i===1 || i===pages || (i>=currentPage-1 && i<=currentPage+1)){
      html += `<button class="page-btn ${i===currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    } else if(i===currentPage-2 || i===currentPage+2){
      html += `<span class="page-info">...</span>`;
    }
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages ? 'disabled' : ''}>›</button>`;
  html += `<span class="page-info">หน้า ${currentPage} / ${pages}</span>`;
  paginationDiv.innerHTML = html;
}

function goPage(p) {
  const pages = Math.ceil(filteredRecords.length/PAGE_SIZE);
  if(p<1 || p>pages) return;
  currentPage = p;
  renderUI();
  window.scrollTo({top:0, behavior:'smooth'});
}

function applyFilter() {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const car = document.getElementById('filterCar').value.toLowerCase();
  const status = document.getElementById('filterStatus').value;
  const date = document.getElementById('filterDate').value;
  
  filteredRecords = allRecords.filter(r => {
    if(search && !(`${r.name} ${r.car} ${r.reason} ${r.phone}`).toLowerCase().includes(search)) return false;
    if(car && !r.car?.toLowerCase().includes(car)) return false;
    if(status && r.returnStatus !== status) return false;
    if(date && r.timestamp && !r.timestamp.startsWith(date)) return false;
    return true;
  });
  currentPage = 1;
  renderUI();
}

function resetFilter() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterCar').value = '';
  document.getElementById('filterStatus').value = '';
  document.getElementById('filterDate').value = '';
  filteredRecords = [...allRecords];
  currentPage = 1;
  renderUI();
}

function exportCSV() {
  const data = filteredRecords.length ? filteredRecords : allRecords;
  const headers = ['ชื่อ','เบอร์โทร','แผนก','ทะเบียนรถ','ไมล์เริ่ม','สาเหตุ','ระยะทาง(กม)','วันเวลาเริ่ม','สถานะ','วันเวลาคืน','ระยะเวลา'];
  const rows = data.map(r => [
    r.name, r.phone, r.department, r.car, r.mileage, r.reason,
    r.totalDistance || 0, r.timestamp, r.returnStatus === 'returned' ? 'คืนแล้ว' : 'กำลังใช้',
    r.returnedAt || '', r.durationText || ''
  ]);
  const csvContent = "\uFEFF" + [headers, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csvContent], {type: 'text/csv;charset=utf-8'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `car_history_${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
  URL.revokeObjectURL(link.href);
}

function formatDate(iso){
  if(!iso) return '-';
  try{
    return new Date(iso).toLocaleString('th-TH', {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
  }catch(e){ return iso; }
}

function escapeHtml(str){
  if(!str) return '';
  return String(str).replace(/[&<>]/g, function(m){
    if(m === '&') return '&amp;';
    if(m === '<') return '&lt;';
    if(m === '>') return '&gt;';
    return m;
  });
}

document.getElementById('searchInput').addEventListener('input', applyFilter);
document.getElementById('exportBtn').addEventListener('click', exportCSV);
loadData();
setInterval(loadData, 120000);
</script>
</body>
</html>
